<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Pixel Portfolio — Peter Dinis</title>
  <meta name="description" content="Peter Dinis — Full Stack Developer. Interaktívne pixel portfólio s projektmi z dinis-portfolio.vercel.app." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            sans: ['Inter', 'system-ui', 'sans-serif']
          },
          colors: {
            pixel: { gold: '#FFD580', orange: '#FF8C42', brown: '#3D2B1F' },
            accent: { cyan: '#00F5FF', coral: '#FF8C42' }
          },
          boxShadow: {
            pixel: '4px 4px 0 #3D2B1F',
            glow: '0 0 24px rgba(0, 245, 255, 0.2)'
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="./css/main.css" />
</head>
<body class="font-sans antialiased bg-[var(--bg-app)] text-slate-100 overflow-hidden">
  <nav class="settings-bar fixed top-3 right-3 z-[110] flex flex-col gap-2 items-end pointer-events-auto max-w-[min(100%,280px)]" aria-label="Nastavenia">
    <div class="flex gap-1 rounded-lg border-2 border-[var(--panel-border)] bg-[var(--panel-bg)] p-1 backdrop-blur-sm" role="group" aria-labelledby="settings-lang-label">
      <span class="settings-group-label sr-only" id="settings-lang-label" data-i18n="lang">Jazyk</span>
      <button type="button" class="settings-btn active rounded px-2.5 py-2 font-pixel text-[5px] uppercase tracking-wide transition-colors" id="lang-sk" data-lang-btn="sk" aria-pressed="true">SK</button>
      <button type="button" class="settings-btn rounded px-2.5 py-2 font-pixel text-[5px] uppercase tracking-wide transition-colors" id="lang-en" data-lang-btn="en" aria-pressed="false">EN</button>
    </div>
    <div class="flex gap-1 rounded-lg border-2 border-[var(--panel-border)] bg-[var(--panel-bg)] p-1 backdrop-blur-sm" role="group" aria-labelledby="settings-theme-label">
      <span class="settings-group-label sr-only" id="settings-theme-label" data-i18n="theme">Téma</span>
      <button type="button" class="settings-btn active rounded px-2.5 py-2 font-pixel text-[5px] uppercase tracking-wide transition-colors" id="theme-light" data-theme-btn="light" aria-pressed="true" data-i18n="themeLight">Deň</button>
      <button type="button" class="settings-btn rounded px-2.5 py-2 font-pixel text-[5px] uppercase tracking-wide transition-colors" id="theme-dark" data-theme-btn="dark" aria-pressed="false" data-i18n="themeDark">Noc</button>
    </div>
  </nav>

  <div id="intro-screen" class="fixed inset-0 z-[100] bg-[var(--intro-bg)] transition-all duration-700" role="dialog" aria-modal="true" aria-labelledby="intro-name">
    <canvas id="intro-canvas" class="block h-full w-full" aria-hidden="true"></canvas>
    <div class="intro-ui absolute inset-0 flex flex-col items-center justify-center p-6 text-center pointer-events-none">
      <h1 class="intro-name font-pixel text-pixel-gold drop-shadow-pixel min-h-[2.4em] text-[clamp(14px,4.5vw,28px)] leading-relaxed tracking-wider" id="intro-name" aria-live="polite"></h1>
      <p class="intro-sub mt-4 font-pixel text-[clamp(6px,1.8vw,10px)] text-pixel-orange opacity-0 transition-opacity duration-500" id="intro-sub"></p>
      <div class="intro-load absolute bottom-[18%] left-1/2 w-[min(280px,70vw)] -translate-x-1/2">
        <div class="load-bar-wrap h-4 border-[3px] border-pixel-orange bg-pixel-brown p-0.5" aria-hidden="true">
          <div class="load-bar h-full w-0 bg-gradient-to-r from-pixel-orange to-pixel-gold transition-[width] duration-100" id="load-bar"></div>
        </div>
        <span class="load-text mt-2 block text-center font-pixel text-[7px] text-gray-500" id="load-text"></span>
      </div>
      <div class="char-select pointer-events-auto mt-5 opacity-0 transition-opacity duration-500" id="char-select" role="group" aria-labelledby="char-select-label">
        <p class="char-select-label mb-3 font-pixel text-[clamp(6px,1.6vw,9px)] text-pixel-gold" id="char-select-label">Vyber postavu</p>
        <div class="char-options flex flex-wrap justify-center gap-3">
          <button type="button" class="char-option selected min-w-[120px] cursor-pointer rounded-none border-[3px] border-pixel-orange bg-[var(--panel-bg)] px-3.5 py-3 font-pixel text-[clamp(5px,1.4vw,8px)] text-pixel-gold shadow-[0_0_16px_rgba(255,140,66,0.35)] transition-all" data-mode="walker" aria-pressed="true">
            <span class="char-option-icon mb-1.5 block text-2xl" aria-hidden="true">🚶</span>
            <span class="char-label">Pešiak</span>
          </button>
          <button type="button" class="char-option min-w-[120px] cursor-pointer rounded-none border-[3px] border-[var(--panel-border)] bg-[var(--panel-bg)] px-3.5 py-3 font-pixel text-[clamp(5px,1.4vw,8px)] text-gray-400 transition-all hover:-translate-y-0.5 hover:text-pixel-gold" data-mode="car" aria-pressed="false">
            <span class="char-option-icon mb-1.5 block text-2xl" aria-hidden="true">🚗</span>
            <span class="char-label">Auto</span>
          </button>
        </div>
      </div>
      <button type="button" id="intro-start" class="pointer-events-auto mt-7 translate-y-3 border-[3px] border-pixel-gold bg-pixel-orange px-6 py-3.5 font-pixel text-[clamp(7px,2vw,10px)] text-pixel-brown opacity-0 transition-all duration-500 hover:brightness-110">▶ Začať dobrodružstvo</button>
    </div>
  </div>

  <div id="game-wrap" class="relative h-full w-full">
    <canvas id="world" class="block h-full w-full" aria-label="Portfolio game world"></canvas>
    <div id="zone-overlay" class="pointer-events-none fixed inset-0 z-[2] mix-blend-multiply opacity-0 transition-opacity duration-1000" aria-hidden="true"></div>
    <div id="fade-overlay" class="pointer-events-none fixed inset-0 z-[15] bg-black opacity-0 transition-opacity duration-500" aria-hidden="true"></div>
    <div id="hud" class="pointer-events-none fixed left-3 top-3 z-[5] font-pixel text-[8px] leading-relaxed text-[var(--text-hud)] drop-shadow-[2px_2px_0_#000] md:text-[8px] max-md:text-[6px]" aria-live="polite">
      <div id="zone-name">LEVEL 1</div>
      <div id="hint-text"></div>
    </div>
    <div id="joystick-zone" class="fixed bottom-6 left-6 z-[8] hidden h-[120px] w-[120px] max-md:block touch-none">
      <div id="joystick-base" class="h-full w-full rounded-full border-2 border-white/35 bg-white/10"></div>
      <div id="joystick-knob" class="pointer-events-none absolute left-1/2 top-1/2 h-12 w-12 -translate-x-1/2 -translate-y-1/2 rounded-full border-2 border-pixel-orange bg-[#FFD580]/85 shadow-lg"></div>
    </div>
    <button type="button" id="interact-btn" class="interact-btn-label fixed bottom-7 right-6 z-[9] hidden cursor-pointer rounded-lg border-2 border-pixel-orange bg-[#FFD580]/95 px-4 py-3.5 font-pixel text-[8px] text-pixel-brown shadow-lg">E</button>
  </div>

  <div class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/75 p-4 opacity-0 invisible transition-all duration-300" id="modal-about" role="dialog" aria-modal="true" aria-labelledby="about-title">
    <div class="modal relative max-h-[85vh] w-full max-w-lg translate-y-3 overflow-y-auto rounded-xl border-2 border-accent-cyan bg-[var(--modal-bg)] p-6 text-[var(--modal-text)] shadow-glow transition-transform duration-300" tabindex="-1">
      <button type="button" class="modal-close absolute right-3 top-3 flex h-9 w-9 items-center justify-center rounded-lg bg-white/10 text-lg text-white transition hover:bg-white/20" aria-label="Zavrieť">×</button>
      <h2 id="about-title" class="mb-3 pr-10 text-xl font-bold text-white">About Me</h2>
      <img class="modal-photo my-3 block max-w-[200px] rounded-lg border-4 border-pixel-orange" id="about-photo" src="" alt="" width="200" height="200" />
      <p id="about-bio" class="text-[0.95rem] leading-relaxed text-slate-300"></p>
      <div class="interest-icons mt-3 flex gap-3 text-2xl" id="about-interests" aria-label="Interests"></div>
    </div>
  </div>

  <div class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/75 p-4 opacity-0 invisible transition-all duration-300" id="modal-project" role="dialog" aria-modal="true" aria-labelledby="project-title">
    <div class="modal relative max-h-[85vh] w-full max-w-lg translate-y-3 overflow-y-auto rounded-xl border-2 border-accent-cyan bg-[var(--modal-bg)] p-6 text-[var(--modal-text)] shadow-glow transition-transform duration-300" tabindex="-1">
      <button type="button" class="modal-close absolute right-3 top-3 flex h-9 w-9 items-center justify-center rounded-lg bg-white/10 text-lg text-white transition hover:bg-white/20" aria-label="Zavrieť">×</button>
      <h2 id="project-title" class="mb-2 pr-10 text-xl font-bold text-white"></h2>
      <div class="tags mb-3 flex flex-wrap gap-2" id="project-tags"></div>
      <p id="project-desc" class="text-[0.95rem] leading-relaxed text-slate-300"></p>
      <img class="project-thumb my-3 w-full rounded-lg border border-accent-cyan/30" id="project-thumb" src="" alt="" />
      <div class="modal-actions mt-4 flex flex-wrap gap-2.5">
        <a class="btn-primary inline-flex items-center rounded-lg bg-accent-cyan px-4 py-2.5 text-sm font-semibold text-slate-900 no-underline transition hover:-translate-y-px" id="project-live" href="#" target="_blank" rel="noopener">View Live</a>
        <a class="btn-secondary inline-flex items-center rounded-lg bg-white/10 px-4 py-2.5 text-sm font-semibold text-white no-underline transition hover:-translate-y-px" id="project-github" href="#" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </div>

  <div class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/75 p-4 opacity-0 invisible transition-all duration-300" id="modal-experience" role="dialog" aria-modal="true" aria-labelledby="exp-title">
    <div class="modal relative max-h-[85vh] w-full max-w-lg translate-y-3 overflow-y-auto rounded-xl border-2 border-accent-cyan bg-[var(--modal-bg)] p-6 text-[var(--modal-text)] shadow-glow transition-transform duration-300" tabindex="-1">
      <button type="button" class="modal-close absolute right-3 top-3 flex h-9 w-9 items-center justify-center rounded-lg bg-white/10 text-lg text-white transition hover:bg-white/20" aria-label="Zavrieť">×</button>
      <h2 id="exp-title" class="mb-1 pr-10 text-xl font-bold text-white"></h2>
      <p id="exp-company" class="mb-1 text-sm font-medium text-accent-coral"></p>
      <p id="exp-dates" class="mb-3 font-pixel text-[6px] text-[#C9A84C]"></p>
      <ul id="exp-bullets" class="ml-5 list-disc space-y-1 text-[0.95rem] text-slate-300"></ul>
    </div>
  </div>

  <div class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/75 p-4 opacity-0 invisible transition-all duration-300" id="modal-contact" role="dialog" aria-modal="true" aria-labelledby="contact-title">
    <div class="modal relative max-h-[85vh] w-full max-w-lg translate-y-3 overflow-y-auto rounded-xl border-2 border-accent-cyan bg-[var(--modal-bg)] p-6 text-[var(--modal-text)] shadow-glow transition-transform duration-300" tabindex="-1">
      <button type="button" class="modal-close absolute right-3 top-3 flex h-9 w-9 items-center justify-center rounded-lg bg-white/10 text-lg text-white transition hover:bg-white/20" aria-label="Zavrieť">×</button>
      <h2 id="contact-title" class="mb-4 pr-10 text-xl font-bold text-white">Contact</h2>
      <form class="contact-form space-y-1" id="contact-form" action="#" method="post">
        <label for="cf-name" class="mt-3 block text-sm text-slate-400">Meno</label>
        <input type="text" id="cf-name" name="name" required autocomplete="name" class="mt-1 w-full rounded-lg border border-white/15 bg-black/35 px-3 py-2.5 text-white outline-none focus:border-accent-cyan focus:ring-2 focus:ring-accent-cyan/30" />
        <label for="cf-email" class="mt-3 block text-sm text-slate-400">Email</label>
        <input type="email" id="cf-email" name="email" required autocomplete="email" class="mt-1 w-full rounded-lg border border-white/15 bg-black/35 px-3 py-2.5 text-white outline-none focus:border-accent-cyan focus:ring-2 focus:ring-accent-cyan/30" />
        <label for="cf-message" class="mt-3 block text-sm text-slate-400">Správa</label>
        <textarea id="cf-message" name="message" rows="4" required class="mt-1 w-full resize-y rounded-lg border border-white/15 bg-black/35 px-3 py-2.5 text-white outline-none focus:border-accent-cyan focus:ring-2 focus:ring-accent-cyan/30"></textarea>
        <div class="modal-actions pt-2">
          <button type="submit" class="btn-primary cursor-pointer rounded-lg border-0 bg-accent-cyan px-4 py-2.5 text-sm font-semibold text-slate-900 transition hover:-translate-y-px">Odoslať</button>
        </div>
      </form>
    </div>
  </div>

  <div id="cutscene" class="pointer-events-none fixed inset-0 z-[80] invisible opacity-0 transition-opacity duration-500" aria-hidden="true">
    <canvas id="cutscene-canvas" class="block h-full w-full"></canvas>
  </div>

  <div id="end-screen" class="invisible fixed inset-0 z-[90] flex flex-col items-center justify-center bg-slate-950/90 p-6 text-center opacity-0 transition-opacity duration-[1.2s]" role="dialog" aria-modal="true" aria-labelledby="end-msg">
    <h2 id="end-msg" class="mb-6 max-w-2xl font-pixel text-[clamp(10px,2.8vw,16px)] leading-loose text-[#FFF1B0]"></h2>
    <p class="end-sub mb-7 max-w-md text-base leading-relaxed text-slate-300" id="end-sub"></p>
    <div class="end-actions flex flex-wrap justify-center gap-3">
      <button class="cta cursor-pointer rounded-[10px] border-0 bg-[#4DA6FF] px-6 py-3.5 text-sm font-semibold text-slate-900 transition hover:-translate-y-0.5" id="end-cta" type="button">Kontakt</button>
      <button class="cta cursor-pointer rounded-[10px] border border-white/25 bg-white/10 px-6 py-3.5 text-sm font-semibold text-[#FFF1B0] transition hover:-translate-y-0.5" id="end-replay" type="button">Prejsť znova</button>
    </div>
  </div>

  <script src="./js/data.js"></script>
  <script src="./js/config.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/game.js"></script>
</body>
</html>
